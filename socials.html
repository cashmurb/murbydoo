  <style>
    .socials-section {
      padding: 4rem 1.5rem 6rem;
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .socials-header {
      margin-bottom: 3rem;
    }

    .socials-header h1 {
      margin-bottom: 0.4rem;
    }

    .socials-header p {
      font-family: var(--font-body);
      font-style: italic;
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 0;
    }

    /* Gallery grid */
    .socials-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
    }

    .social-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem 2rem 1.75rem;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      min-height: 200px;
    }

    .social-card:hover {
      border-color: var(--accent);
      box-shadow: 0 6px 24px rgba(90,138,106,0.10);
      transform: translateY(-3px);
      color: var(--text);
    }

    .social-card-top {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .social-icon {
      width: 36px;
      height: 36px;
      opacity: 0.85;
    }

    .social-name {
      font-family: var(--font-body);
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--text);
      margin: 0;
    }

    .social-handle {
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-style: italic;
      color: var(--text-muted);
    }

    .social-arrow {
      font-size: 1.1rem;
      color: var(--accent);
      align-self: flex-end;
      margin-top: 1.5rem;
      transition: transform 0.15s;
    }

    .social-card:hover .social-arrow {
      transform: translate(3px, -3px);
    }

    @media (max-width: 540px) {
      .socials-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
